name: Check for upstream updates

on:
  schedule:
    - cron: '23 7 * * 1'  # Mondays at 07:23 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      changes_found: ${{ steps.detect.outputs.changes_found }}
      report: ${{ steps.detect.outputs.report }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate workflow YAML
        run: python3 -c "import yaml; yaml.safe_load(open('.github/workflows/check-updates.yml')); print('Workflow YAML is valid')"

      - name: Read current versions
        id: current
        run: |
          gstack_commit=$(grep 'GStack' VERSIONS.md | grep -oE '[a-f0-9]{7}' | head -1)
          superpowers_version=$(grep 'Superpowers' VERSIONS.md | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          claude_version=$(grep 'Claude Code' VERSIONS.md | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "gstack_commit=$gstack_commit" >> "$GITHUB_OUTPUT"
          echo "superpowers_version=$superpowers_version" >> "$GITHUB_OUTPUT"
          echo "claude_version=$claude_version" >> "$GITHUB_OUTPUT"

      - name: Check GStack
        id: gstack
        run: |
          git clone --depth 200 https://github.com/garrytan/gstack.git /tmp/gstack
          cd /tmp/gstack
          latest_commit=$(git rev-parse --short HEAD)
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "unknown")

          if [[ "$latest_commit" != "${{ steps.current.outputs.gstack_commit }}" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "latest_commit=$latest_commit" >> "$GITHUB_OUTPUT"
            echo "latest_commit_full=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"

            # Get changelog since our known commit
            changelog=$(git log --oneline ${{ steps.current.outputs.gstack_commit }}..HEAD 2>/dev/null | head -30 || echo "Could not diff — full clone needed")
            echo "changelog<<GSTACK_EOF" >> "$GITHUB_OUTPUT"
            echo "$changelog" >> "$GITHUB_OUTPUT"
            echo "GSTACK_EOF" >> "$GITHUB_OUTPUT"

            # Capture changed skill files
            skill_changes=$(git diff --name-only ${{ steps.current.outputs.gstack_commit }}..HEAD -- '*/SKILL.md' 2>/dev/null | head -30 || echo "unknown")
            echo "skill_changes<<GSTACK_SKILLS_EOF" >> "$GITHUB_OUTPUT"
            echo "$skill_changes" >> "$GITHUB_OUTPUT"
            echo "GSTACK_SKILLS_EOF" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Superpowers
        id: superpowers
        run: |
          git clone --depth 1 https://github.com/obra/superpowers.git /tmp/superpowers
          cd /tmp/superpowers

          # Get version from plugin.json
          latest_version=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json')).get('version', 'unknown'))" 2>/dev/null || echo "unknown")

          if [[ "$latest_version" != "${{ steps.current.outputs.superpowers_version }}" ]] && [[ "$latest_version" != "unknown" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "latest_version=$latest_version" >> "$GITHUB_OUTPUT"

            # Get changelog if exists
            if [ -f CHANGELOG.md ]; then
              changelog=$(head -80 CHANGELOG.md)
            elif [ -f RELEASE-NOTES.md ]; then
              changelog=$(head -80 RELEASE-NOTES.md)
            else
              changelog="No changelog found — review repo manually"
            fi
            echo "changelog<<SP_EOF" >> "$GITHUB_OUTPUT"
            echo "$changelog" >> "$GITHUB_OUTPUT"
            echo "SP_EOF" >> "$GITHUB_OUTPUT"

            # List changed skills
            skill_files=$(find . -name "SKILL.md" | sort)
            echo "skill_files<<SP_SKILLS_EOF" >> "$GITHUB_OUTPUT"
            echo "$skill_files" >> "$GITHUB_OUTPUT"
            echo "SP_SKILLS_EOF" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Claude Code
        id: claude_code
        run: |
          latest_version=$(npm view @anthropic-ai/claude-code version 2>/dev/null || echo "unknown")

          if [[ "$latest_version" != "${{ steps.current.outputs.claude_version }}" ]] && [[ "$latest_version" != "unknown" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "latest_version=$latest_version" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build report
        id: detect
        env:
          GSTACK_CHANGED: ${{ steps.gstack.outputs.changed }}
          GSTACK_TAG: ${{ steps.gstack.outputs.latest_tag }}
          GSTACK_COMMIT: ${{ steps.gstack.outputs.latest_commit }}
          GSTACK_CHANGELOG: ${{ steps.gstack.outputs.changelog }}
          GSTACK_SKILLS: ${{ steps.gstack.outputs.skill_changes }}
          SP_CHANGED: ${{ steps.superpowers.outputs.changed }}
          SP_VERSION: ${{ steps.superpowers.outputs.latest_version }}
          SP_CHANGELOG: ${{ steps.superpowers.outputs.changelog }}
          CC_CHANGED: ${{ steps.claude_code.outputs.changed }}
          CC_VERSION: ${{ steps.claude_code.outputs.latest_version }}
          CC_PREV: ${{ steps.current.outputs.claude_version }}
        run: |
          changes_found=false
          report_file=$(mktemp)

          if [[ "$GSTACK_CHANGED" == "true" ]]; then
            changes_found=true
            printf '## GStack updated\n**New version:** %s (%s)\n\n### Commits\n```\n%s\n```\n\n### Changed skills\n```\n%s\n```\n\n' \
              "$GSTACK_TAG" "$GSTACK_COMMIT" "$GSTACK_CHANGELOG" "$GSTACK_SKILLS" >> "$report_file"
          fi

          if [[ "$SP_CHANGED" == "true" ]]; then
            changes_found=true
            printf '## Superpowers updated\n**New version:** %s\n\n### Changelog\n%s\n\n' \
              "$SP_VERSION" "$SP_CHANGELOG" >> "$report_file"
          fi

          if [[ "$CC_CHANGED" == "true" ]]; then
            changes_found=true
            printf '## Claude Code updated\n**New version:** %s (was: %s)\n\n' \
              "$CC_VERSION" "$CC_PREV" >> "$report_file"
          fi

          echo "changes_found=$changes_found" >> "$GITHUB_OUTPUT"
          {
            echo "report<<REPORT_EOF"
            cat "$report_file"
            echo "REPORT_EOF"
          } >> "$GITHUB_OUTPUT"
          rm -f "$report_file"

      - name: Upload upstream sources
        if: steps.detect.outputs.changes_found == 'true'
        run: |
          mkdir -p /tmp/upstream-context

          # GStack skill files — skills are directories in the repo root, each with SKILL.md
          if [[ "${{ steps.gstack.outputs.changed }}" == "true" ]]; then
            find /tmp/gstack -maxdepth 2 -name "SKILL.md" -exec sh -c 'mkdir -p /tmp/upstream-context/gstack/$(basename $(dirname "$1")) && cp "$1" /tmp/upstream-context/gstack/$(basename $(dirname "$1"))/' _ {} \;
          fi

          # Superpowers skill files — under skills/ directory
          if [[ "${{ steps.superpowers.outputs.changed }}" == "true" ]]; then
            find /tmp/superpowers -name "SKILL.md" -exec sh -c 'mkdir -p /tmp/upstream-context/superpowers/$(basename $(dirname "$1")) && cp "$1" /tmp/upstream-context/superpowers/$(basename $(dirname "$1"))/' _ {} \;
          fi

          tar czf /tmp/upstream-context.tar.gz -C /tmp upstream-context

      - uses: actions/upload-artifact@v4
        if: steps.detect.outputs.changes_found == 'true'
        with:
          name: upstream-context
          path: /tmp/upstream-context.tar.gz
          retention-days: 1

  update-manual:
    needs: check
    if: needs.check.outputs.changes_found == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: upstream-context
          path: /tmp

      - name: Extract upstream context
        run: |
          if [ -f /tmp/upstream-context.tar.gz ]; then
            tar xzf /tmp/upstream-context.tar.gz -C /tmp
          else
            echo "Warning: no upstream context artifact found, continuing without skill files"
            mkdir -p /tmp/upstream-context
          fi

      - name: Update manual with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPORT: ${{ needs.check.outputs.report }}
        run: |
          python3 << 'PYTHON_EOF'
          import json, os, subprocess, sys
          from pathlib import Path

          report = os.environ.get("REPORT", "")
          manual = Path("README.md").read_text()
          versions = Path("VERSIONS.md").read_text()
          changelog = Path("CHANGELOG.md").read_text() if Path("CHANGELOG.md").exists() else ""

          # Collect upstream skill files — only changed ones to reduce payload
          upstream = ""
          ctx_dir = Path("/tmp/upstream-context")
          if ctx_dir.exists():
              for skill_file in sorted(ctx_dir.rglob("SKILL.md")):
                  skill_name = skill_file.parent.name
                  content = skill_file.read_text()[:1000]
                  upstream += f"\n--- {skill_name}/SKILL.md ---\n{content}\n"
              upstream = upstream[:15000]

          from datetime import date
          today = date.today().isoformat()

          # Read skill files if they exist
          setup_routing_skill = ""
          skill_path = Path("skills/setup-routing/SKILL.md")
          if skill_path.exists():
              setup_routing_skill = skill_path.read_text()

          adapt_skill = ""
          adapt_path = Path("skills/adapt/SKILL.md")
          if adapt_path.exists():
              adapt_skill = adapt_path.read_text()

          prompt = f"""You are updating the README for the Superpowers + GStack Claude Code plugin.
          Today's date is {today}.

          ## Your task
          1. Read the current README and the upstream changes report
          2. Identify which sections of the README are affected by the changes
          3. Update ONLY the affected sections — preserve everything else exactly
          4. Update VERSIONS.md with new version numbers and today's date
          5. Add a new entry at the top of CHANGELOG.md summarizing the upstream changes
          6. If skills were added/removed/renamed upstream, update the setup-routing SKILL.md skill evaluation tables
          7. Output the complete updated files

          ## Rules
          - Only change sections directly affected by upstream changes
          - Keep the same structure, style, and tone
          - If a skill was renamed, update all references in ALL files (README + SKILL.md)
          - If a skill was added, add it to Quick Reference, relevant README sections, AND the skill evaluation tables in BOTH setup-routing/SKILL.md and adapt/SKILL.md
          - If a skill was removed, remove it from all sections and both skill evaluation tables
          - The evaluation tables in setup-routing/SKILL.md and adapt/SKILL.md MUST remain identical
          - If behavior changed, update the description
          - Do NOT add speculative content — only document what the upstream changes confirm
          - Do NOT rewrite sections that aren't affected"""

          skill_section = ""
          if setup_routing_skill:
              skill_section = f"""

          ## Current setup-routing SKILL.md

          {setup_routing_skill}"""

          if adapt_skill:
              skill_section += f"""

          ## Current adapt SKILL.md

          {adapt_skill}"""

          user_content = f"""{prompt}

          ## Changes detected

          {report}

          ## Current README

          {manual}

          ## Current VERSIONS.md

          {versions}

          ## Current CHANGELOG.md

          {changelog}{skill_section}

          ## Upstream skill definitions (for reference)

          {upstream}

          ## Output format

          Return the files separated by markers. Always include:
          1. The complete updated README
          2. The marker `===VERSIONS.md===`
          3. The complete updated VERSIONS.md
          4. The marker `===CHANGELOG.md===`
          5. The complete updated CHANGELOG.md
          6. If the setup-routing SKILL.md needs updates (skills added/removed/renamed), also include:
             - The marker `===SKILL.md===`
             - The complete updated setup-routing SKILL.md
          7. If the adapt SKILL.md needs updates (must stay in sync with setup-routing tables), also include:
             - The marker `===ADAPT_SKILL.md===`
             - The complete updated adapt SKILL.md

          Output ONLY the file contents and markers, no markdown fences or commentary."""

          request = {
              "model": "claude-sonnet-4-6",
              "max_tokens": 32000,
              "messages": [{"role": "user", "content": user_content}]
          }

          # Write request to file to avoid shell argument limits
          Path("/tmp/api-request.json").write_text(json.dumps(request))

          result = subprocess.run(
              ["curl", "-s", "-w", "\n%{http_code}",
               "https://api.anthropic.com/v1/messages",
               "-H", f"x-api-key: {os.environ['ANTHROPIC_API_KEY']}",
               "-H", "anthropic-version: 2023-06-01",
               "-H", "content-type: application/json",
               "-d", "@/tmp/api-request.json"],
              capture_output=True, text=True, timeout=300
          )

          lines = result.stdout.strip().rsplit("\n", 1)
          body = lines[0] if len(lines) > 1 else result.stdout
          status = lines[1] if len(lines) > 1 else "unknown"

          if status != "200":
              print(f"API error (HTTP {status}): {body[:500]}", file=sys.stderr)
              sys.exit(1)

          response = json.loads(body)
          content = response["content"][0]["text"]

          if "===VERSIONS.md===" in content:
              manual_part, rest = content.split("===VERSIONS.md===", 1)
              Path("README.md").write_text(manual_part.strip() + "\n")
              updated = ["README.md"]

              # Split CHANGELOG if present
              if "===CHANGELOG.md===" in rest:
                  versions_part, changelog_rest = rest.split("===CHANGELOG.md===", 1)
                  Path("VERSIONS.md").write_text(versions_part.strip() + "\n")
                  updated.append("VERSIONS.md")
                  rest = changelog_rest

                  # Split skills from changelog
                  if "===SKILL.md===" in rest:
                      changelog_part, skill_rest = rest.split("===SKILL.md===", 1)
                      Path("CHANGELOG.md").write_text(changelog_part.strip() + "\n")
                      updated.append("CHANGELOG.md")

                      if "===ADAPT_SKILL.md===" in skill_rest:
                          setup_part, adapt_part = skill_rest.split("===ADAPT_SKILL.md===", 1)
                          Path("skills/setup-routing/SKILL.md").write_text(setup_part.strip() + "\n")
                          Path("skills/adapt/SKILL.md").write_text(adapt_part.strip() + "\n")
                          updated.extend(["setup-routing/SKILL.md", "adapt/SKILL.md"])
                      else:
                          Path("skills/setup-routing/SKILL.md").write_text(skill_rest.strip() + "\n")
                          updated.append("setup-routing/SKILL.md")
                  else:
                      Path("CHANGELOG.md").write_text(rest.strip() + "\n")
                      updated.append("CHANGELOG.md")
              else:
                  # Fallback: no CHANGELOG marker
                  if "===SKILL.md===" in rest:
                      versions_part, skill_rest = rest.split("===SKILL.md===", 1)
                      Path("VERSIONS.md").write_text(versions_part.strip() + "\n")
                      updated.append("VERSIONS.md")

                      if "===ADAPT_SKILL.md===" in skill_rest:
                          setup_part, adapt_part = skill_rest.split("===ADAPT_SKILL.md===", 1)
                          Path("skills/setup-routing/SKILL.md").write_text(setup_part.strip() + "\n")
                          Path("skills/adapt/SKILL.md").write_text(adapt_part.strip() + "\n")
                          updated.extend(["setup-routing/SKILL.md", "adapt/SKILL.md"])
                      else:
                          Path("skills/setup-routing/SKILL.md").write_text(skill_rest.strip() + "\n")
                          updated.append("setup-routing/SKILL.md")
                  else:
                      Path("VERSIONS.md").write_text(rest.strip() + "\n")
                      updated.append("VERSIONS.md")

              print(f"Files updated: {', '.join(updated)}")
          else:
              Path("README.md").write_text(content.strip() + "\n")
              print("Warning: markers not found, only README updated")
          PYTHON_EOF

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "diff<<DIFF_EOF" >> "$GITHUB_OUTPUT"
            git diff --stat >> "$GITHUB_OUTPUT"
            echo "DIFF_EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.diff.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORT: ${{ needs.check.outputs.report }}
        run: |
          branch="auto-update/$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$branch"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md VERSIONS.md CHANGELOG.md skills/setup-routing/SKILL.md skills/adapt/SKILL.md

          git commit -m "Auto-update README for upstream changes

          Co-Authored-By: Claude Sonnet <noreply@anthropic.com>"
          git push -u origin "$branch"

          gh pr create \
            --title "Auto-update: upstream changes detected" \
            --body "## Upstream changes detected
          ${REPORT}

          ## What happened
          The weekly update checker found changes in GStack, Superpowers, or Claude Code.
          Claude Sonnet analyzed the changes and updated the manual accordingly.

          ## Action needed
          Review the diff to verify the updates are accurate, then merge.

          ---
          *This PR was created automatically by the check-updates workflow.*" \
            --label "auto-update"

      - name: Create notification issue
        if: steps.diff.outputs.has_changes == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORT: ${{ needs.check.outputs.report }}
        run: |
          pr_url=$(gh pr list --label auto-update --state open --json url -q '.[0].url')

          gh issue create \
            --title "Manual update ready for review — $(date +%Y-%m-%d)" \
            --body "An automated update to the Superpowers + GStack manual is ready for review.

          **PR:** ${pr_url}

          ${REPORT}

          ---
          *Close this issue after reviewing the PR.*" \
            --label "notification"
