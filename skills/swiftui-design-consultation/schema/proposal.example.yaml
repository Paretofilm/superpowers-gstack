# Example proposal — populated, schema-valid.
#
# This is what Phase 3 produces (alongside the human-readable
# proposal Markdown). Phase 6 reads it, validates against
# proposal.schema.yaml, then generates DESIGN.md AND DesignSystem/*
# from the same parsed object.
#
# Use this file as a template for new proposals. Every field shown
# here is either required or strongly recommended.

schema_version: 1

metadata:
  date: "2026-05-18"
  product_name: "Lighthouse"
  product_context: |
    Lighthouse is a macOS menu-bar utility for solo founders.
    Tracks recurring tasks (weekly retros, monthly reviews) and
    surfaces them at the right time without notification fatigue.
  memorable_thing: |
    The friction-free completion gesture — three-finger swipe right
    on the menu-bar popover marks the surfaced task done.
  aesthetic_direction: |
    Editorial calm. The app should feel like a well-designed
    notebook — quiet, deliberate, never demanding attention.

track: macos

typography:
  prose: |
    SF Pro paired with Charter for editorial titles. Tabular numerics
    everywhere counts/dates appear. Dynamic Type respected up to AX3
    (popovers don't need full AX5 since they're inherently bounded).
  roles:
    - name: display
      font_family: "Charter"
      size_pt: 28
      weight: bold
      line_height: 1.15
      tracking: -0.4
      dynamic_type_role: largeTitle
    - name: title
      font_family: "SF Pro"
      size_pt: 17
      weight: semibold
      line_height: 1.25
      tracking: 0.0
      dynamic_type_role: title3
    - name: body
      font_family: "SF Pro"
      size_pt: 14
      weight: regular
      line_height: 1.4
      tracking: 0.0
      dynamic_type_role: body
    - name: caption
      font_family: "SF Pro"
      size_pt: 11
      weight: regular
      line_height: 1.3
      tracking: 0.1
      dynamic_type_role: caption
    - name: code
      font_family: "SF Mono"
      size_pt: 13
      weight: regular
      line_height: 1.4
      tracking: 0.0
      dynamic_type_role: footnote

color:
  prose: |
    Warm copper as the single accent. Apple semantic colors
    everywhere else — backgrounds, labels, separators all use
    NSColor system tokens so dark mode is automatic.
  brand:
    - name: AccentCopper
      hex_light: "#B5651D"
      hex_dark: "#D4843F"
      hex_high_contrast_light: "#7A4413"
      hex_high_contrast_dark: "#E8A65A"
  semantic:
    - name: primaryLabel
      system_color: label
    - name: secondaryLabel
      system_color: secondaryLabel
    - name: appBackground
      system_color: windowBackgroundColor
    - name: cardBackground
      system_color: controlBackgroundColor
    - name: separator
      system_color: separatorColor

materials:
  prose: |
    Glass lives in chrome only — the menu-bar popover surface uses
    .glassEffect on its container; the list-row content layer is
    .clear over a solid background. Reading lists against glass is
    a HIG anti-pattern (S7-material-on-content).
  chrome_layers:
    - "MenuBarExtra popover container"
    - "Settings sheet"
  content_layers:
    - "Task list rows"
    - "Detail panel"

motion:
  prose: |
    Three named presets cover the entire app. snappy for state toggles,
    smooth for sheet present/dismiss, bouncy for the completion gesture
    payoff. Reduce Motion replaces all three with a 0.15s linear fade.
  presets:
    - name: snappyToggle
      declaration: ".snappy(duration: 0.2)"
      use_case: "Checkbox state changes, toggle switches."
    - name: smoothSheet
      declaration: ".smooth(duration: 0.35)"
      use_case: "Sheet present/dismiss."
    - name: bouncyComplete
      declaration: ".spring(response: 0.4, dampingFraction: 0.65)"
      use_case: "Task completion payoff animation."

spacing:
  prose: |
    8-pt grid. Five named tokens cover all UI surfaces. Corner radii
    follow Apple-canonical 6 / 12 / 18 for control / card / window.
  constants:
    - { name: xs, value_pt: 4 }
    - { name: sm, value_pt: 8 }
    - { name: md, value_pt: 16 }
    - { name: lg, value_pt: 24 }
    - { name: xl, value_pt: 32 }
  radius:
    - { name: control, value_pt: 6 }
    - { name: card, value_pt: 12 }
    - { name: window, value_pt: 18 }

accessibility:
  prose: |
    Every interactive control has an explicit .accessibilityLabel.
    Dynamic Type respected up to AX3. Brand-on-background contrast
    targets WCAG AA (4.5:1 normal text, 3:1 large). Motion presets
    degrade to 0.15s linear fade under Reduce Motion.
  dynamic_type_max: AX3
  contrast_target_aa: true
  reduce_motion_behavior: |
    All three motion presets collapse to a single
    .linear(duration: 0.15) fade when UIAccessibility.isReduceMotionEnabled
    is true (or the macOS equivalent).

platforms:
  prose: |
    macOS 26 only. The app is a menu-bar utility (LSUIElement);
    no dock icon, no primary window. Settings appears as a standard
    macOS Settings scene.
  assertions:
    - platform: macOS
      assertion: "macOS-26.0 minimum"
    - platform: macOS
      assertion: "MenuBarExtra available"
    - platform: macOS
      assertion: "Settings scene available"

budget:
  critical: 0
  significant: 0
  polish: 5

decisions_log:
  - decision: "Single accent color (warm copper)"
    rationale: "Multi-accent feels cluttered for a calm menu-bar utility. Copper differentiates from the standard blue without screaming."
    hig_citation: "https://developer.apple.com/design/human-interface-guidelines/color"
  - decision: "Charter for display, SF Pro elsewhere"
    rationale: "Editorial titles benefit from Charter's warmth; running text needs SF Pro's screen optimization."
  - decision: "Three motion presets, no more"
    rationale: "Constrained motion vocabulary reads as deliberate. Five+ presets typically indicate that the designer didn't decide."
    hig_citation: "https://developer.apple.com/design/human-interface-guidelines/motion"
  - decision: "AX3 dynamic-type cap (not AX5)"
    rationale: "Menu-bar popover is inherently bounded — AX5 would force horizontal scrolling. AX3 covers >99% of users."
    hig_citation: "https://developer.apple.com/design/human-interface-guidelines/accessibility"
